<template>
    <lightning-card title="Topic Description">
        <div class="slds-p-around_medium">
            <template if:true={hasDescriptions}>
                <div class="slds-box slds-theme_default">
                    <ul class="slds-list_dotted">
                        <template for:each={descriptions} for:item="desc">
                            <li key={desc.id} class="slds-m-bottom_x-small">
                                <p class="slds-text-body_regular">{desc.text}</p>
                            </li>
                        </template>
                    </ul>
                </div>
            </template>
            <template if:false={hasDescriptions}>
                <p>No description found.</p>
                <!-- Debug info: -->
                <p style="font-size: 10px; color: gray;">Debug Value: {debugValue}</p>
            </template>
            <div class="slds-m-top_medium slds-text-align_center">
                <lightning-button label="Select Another Topic" variant="brand" onclick={handleSelectAnother}></lightning-button>
            </div>
        </div>
    </lightning-card>
</template>
